<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — ModDeck</title>
<meta name="robots" content="noindex">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
<style>
  :root{--accent:#5b5bf0;--accent2:#0fb5a8}
  *{margin:0;box-sizing:border-box}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;
    font-family:Inter,system-ui,sans-serif;color:#12141d;
    background:#f6f7fb radial-gradient(620px 340px at 50% 0%,rgba(91,91,240,.16),transparent 65%)}
  img{width:56px;height:56px;margin-bottom:18px}
  .code{font-size:84px;font-weight:900;letter-spacing:-3px;line-height:1;
    background:linear-gradient(120deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;color:transparent}
  h1{font-size:24px;font-weight:800;margin:10px 0 6px}
  p{color:#5b6173;max-width:42ch;margin:0 auto 22px}
  a{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;text-decoration:none;
    font-weight:700;padding:12px 22px;border-radius:11px;box-shadow:0 6px 18px rgba(91,91,240,.3)}
  a:hover{background:#4a4ae0}
</style>
</head>
<body>
  <div>
    <img src="favicon.svg" alt="ModDeck">
    <div class="code">404</div>
    <h1>This source went off-air</h1>
    <p>The page you're looking for isn't here. Let's get you back to the control deck.</p>

  </div>
</body>

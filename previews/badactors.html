<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ModDeck — Bad Actors (mockup)</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f6f7fb;--panel:#fff;--panel2:#fbfbfd;--line:#e6e8f0;--line2:#d3d7e3;--ink:#12141d;--dim:#5b6173;--faint:#9aa0b2;
    --accent:#5b5bf0;--danger:#e5484d;--warn:#f59e0b;font-family:Inter,system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);padding:28px;max-width:920px;margin:0 auto}
  .badge{display:inline-block;font-size:10px;font-weight:800;letter-spacing:1px;background:#fde8e8;color:#b4262a;border-radius:6px;padding:3px 9px}
  h1{font-size:26px;font-weight:900;letter-spacing:-.5px;margin:10px 0 4px}
  .sub{color:var(--dim);font-size:14px;margin-bottom:8px}
  .mock{font-size:11.5px;color:var(--warn);font-weight:700;margin-bottom:20px}
  .tabs{display:flex;gap:8px;margin-bottom:14px}
  .tab{display:flex;align-items:center;gap:7px;font-size:13px;font-weight:700;padding:8px 14px;border-radius:9px;border:1px solid var(--line2);background:#fff;color:var(--dim);cursor:pointer}
  .tab.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .tab svg{width:16px;height:16px}
  .row{background:var(--panel);border:1px solid var(--line);border-radius:12px;margin-bottom:10px;overflow:hidden}
  .head{display:flex;align-items:center;gap:13px;padding:14px 16px;cursor:pointer}
  .head:hover{background:var(--panel2)}
  .ic{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex:none}
  .ic.bot{background:#fde8e8;color:var(--danger)} .ic.person{background:#eef0f5;color:var(--dim)}
  .ic svg{width:22px;height:22px}
  .who .u{font-weight:800;font-size:15px}
  .who .id{font-size:11px;color:var(--faint);font-family:ui-monospace,monospace}
  .tags{display:flex;gap:6px;margin-top:4px}
  .t{font-size:9.5px;font-weight:800;letter-spacing:.4px;border-radius:5px;padding:2px 6px}
  .t.spam{background:#fde8e8;color:#b4262a}.t.bot{background:#fff3e0;color:#9a5b00}.t.evade{background:#efeafe;color:#6b46c1}
  .stat{margin-left:auto;text-align:right}
  .stat .n{font-size:22px;font-weight:900;color:var(--danger);line-height:1}
  .stat .l{font-size:10.5px;color:var(--faint)}
  .chev{color:var(--faint);font-size:18px;transition:.2s;margin-left:4px}
  .row.open .chev{transform:rotate(90deg)}
  .detail{display:none;border-top:1px solid var(--line);padding:16px;background:var(--panel2)}
  .row.open .detail{display:block}
  .dcols{display:grid;grid-template-columns:230px 1fr;gap:22px}
  .lab{font-size:11px;font-weight:800;letter-spacing:.6px;color:var(--faint);text-transform:uppercase;margin-bottom:10px}
  .strm{display:flex;align-items:center;gap:9px;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px}
  .strm:last-child{border:none}
  .strm .av{width:22px;height:22px;border-radius:50%;background:linear-gradient(135deg,var(--accent),#0fb5a8)}
  .strm .c{margin-left:auto;font-weight:800;color:var(--danger);font-size:12px}
  .cal{display:flex;gap:3px;overflow:auto;padding-bottom:6px}
  .week{display:flex;flex-direction:column;gap:3px}
  .day{width:13px;height:13px;border-radius:3px;background:#eceef3}
  .legend{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:11px;color:var(--faint)}
  .legend .day{width:11px;height:11px}
  @media(max-width:680px){.dcols{grid-template-columns:1fr}}
</style>
</head>
<body>
  <span class="badge">MOCKUP · bot phase</span>
  <h1>🛡️ Bad Actors</h1>
  <div class="sub">Chat-spam bots &amp; repeat offenders, flagged and shared across every ModDeck channel.</div>
  <div class="mock">This is a design mockup with sample data — it goes live with real chat + moderation in the bot phase.</div>

  <div class="tabs">
    <div class="tab on" id="t-spam"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="8" width="14" height="10" rx="3"/><circle cx="9.2" cy="13" r="1.1" fill="currentColor"/><circle cx="14.8" cy="13" r="1.1" fill="currentColor"/><path d="M12 4v4M8 18v2.5M16 18v2.5M3 12h2M19 12h2"/></svg>Chat-spam bots</div>
    <div class="tab" id="t-rep"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6"/></svg>Repeat offenders</div>
  </div>
  <div id="list"></div>

<script>
var BOT='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="8" width="14" height="10" rx="3"/><circle cx="9.2" cy="13" r="1.1" fill="currentColor"/><circle cx="14.8" cy="13" r="1.1" fill="currentColor"/><path d="M12 4v4M8 18v2.5M16 18v2.5M3 12h2M19 12h2"/></svg>';
var PERSON='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c0-3.6 3.1-6 7-6s7 2.4 7 6"/></svg>';
var SP=[
  {u:"free_followers_bot",id:"kick:8841290",tags:[["bot","BOT"],["spam","CHAT SPAM"]],total:213,streamers:[["xqcLITE",61],["amariii",48],["jordan_tv",37],["pokeking",29],["+ 14 more",38]]},
  {u:"viewer4u_promo",id:"kick:7720115",tags:[["bot","BOT"],["spam","CHAT SPAM"]],total:97,streamers:[["amariii",33],["bookhockeys",22],["+ 9 more",42]]},
  {u:"gambl_xyz_link",id:"kick:9930471",tags:[["bot","BOT"],["spam","CHAT SPAM"],["evade","BAN EVADE"]],total:64,streamers:[["jordan_tv",25],["leagueguy",18],["+ 6 more",21]]},
];
var REP=[
  {u:"toxic_timmy",id:"kick:441902",tags:[["spam","SLURS"]],total:18,streamers:[["bookhockeys",7],["amariii",6],["+ 3 more",5]]},
  {u:"raidcaller99",id:"kick:559210",tags:[["evade","RAID BAIT"]],total:11,streamers:[["pokeking",6],["+ 4 more",5]]},
];
function cal(seed){ // 24 weeks x 7 days; some days "hot"
  var html=''; var r=seed;
  for(var w=0;w<24;w++){ html+='<div class="week">';
    for(var d=0;d<7;d++){ r=(r*1103515245+12345)&0x7fffffff; var v=(r%100); var lvl = v>93?4 : v>86?3 : v>78?2 : v>70?1 : 0;
      var col=['#eceef3','#f7c9c9','#ef9a9a','#e5484d','#b4262a'][lvl];
      html+='<div class="day" style="background:'+col+'" title="'+(lvl?lvl+' timeout(s)':'')+'"></div>'; }
    html+='</div>'; }
  return html;
}
function render(data){
  document.getElementById("list").innerHTML = data.map(function(x,i){
    var bot = x.tags.some(function(t){return t[0]==='bot';});
    return '<div class="row" data-i="'+i+'">'+
      '<div class="head">'+
        '<div class="ic '+(bot?'bot':'person')+'">'+(bot?BOT:PERSON)+'</div>'+
        '<div class="who"><div class="u">'+x.u+'</div><div class="id">'+x.id+'</div>'+
          '<div class="tags">'+x.tags.map(function(t){return '<span class="t '+t[0]+'">'+t[1]+'</span>';}).join('')+'</div></div>'+
        '<div class="stat"><div class="n">'+x.total+'</div><div class="l">timeouts · '+x.streamers.length+'+ streamers</div></div>'+
        '<div class="chev">›</div>'+
      '</div>'+
      '<div class="detail"><div class="dcols">'+
        '<div><div class="lab">Timed out by</div>'+x.streamers.map(function(s){return '<div class="strm"><div class="av"></div>'+s[0]+'<span class="c">'+s[1]+'×</span></div>';}).join('')+'</div>'+
        '<div><div class="lab">When they were wildin out</div><div class="cal">'+cal(i*7+3)+'</div>'+
          '<div class="legend">Less <div class="day" style="background:#eceef3"></div><div class="day" style="background:#f7c9c9"></div><div class="day" style="background:#ef9a9a"></div><div class="day" style="background:#e5484d"></div><div class="day" style="background:#b4262a"></div> More</div></div>'+
      '</div></div>'+
    '</div>';
  }).join("");
  document.querySelectorAll(".row .head").forEach(function(h){ h.onclick=function(){ h.parentNode.classList.toggle("open"); }; });
}
render(SP);
document.getElementById("t-spam").onclick=function(){this.classList.add("on");document.getElementById("t-rep").classList.remove("on");render(SP);};
document.getElementById("t-rep").onclick=function(){this.classList.add("on");document.getElementById("t-spam").classList.remove("on");render(REP);};
</script>
</body>
</html>

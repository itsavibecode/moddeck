<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ModDeck — Logo Options</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f6f7fb;--ink:#12141d;--dim:#5b6173;--accent:#5b5bf0;font-family:Inter,system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);padding:30px}
  h1{font-size:24px;font-weight:900;letter-spacing:-.5px}
  .sub{color:var(--dim);font-size:14px;margin:4px 0 26px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;max-width:1000px}
  .card{background:#fff;border:1px solid #e6e8f0;border-radius:16px;padding:20px;text-align:center}
  .tiles{display:flex;gap:14px;align-items:center;justify-content:center;margin-bottom:14px}
  .tile{width:72px;height:72px}
  .tile.sm{width:40px;height:40px}
  .nm{font-weight:800;font-size:14px}
  .nm .opt{color:var(--accent)}
  .desc{font-size:12px;color:var(--dim);margin-top:4px}
  .wordmark{display:flex;align-items:center;gap:9px;justify-content:center;margin-top:14px;font-weight:800;font-size:17px}
  .wordmark .beta{font-size:8.5px;font-weight:800;letter-spacing:1px;background:#5cc8ff;color:#053048;padding:2px 6px;border-radius:6px}
  .dark{background:#11131c;border-color:#11131c}
  .dark .nm,.dark .wordmark{color:#fff}.dark .desc{color:#9aa0c0}
</style>
</head>
<body>
  <h1>ModDeck — pick a logo mark</h1>
  <div class="sub">Each shown as the app-icon tile + small favicon size + in the wordmark. Tell me a letter (mix/tweak welcome).</div>
  <div class="grid" id="grid"></div>

<script>
var GRAD = '<defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#6d6dff"/><stop offset="1" stop-color="#5b5bf0"/></linearGradient></defs>';
// each mark = white shapes drawn inside a 64x64 indigo rounded tile
var MARKS = {
  A: { name:"A · Monitor (current)", desc:"Overlay screen + live dot. The current mark.",
       art:'<rect x="16" y="17" width="32" height="22" rx="4" fill="#fff"/><circle cx="23" cy="24" r="3" fill="#5b5bf0"/><rect x="16" y="45" width="32" height="5" rx="2.5" fill="#fff" opacity=".92"/><rect x="16" y="45" width="12" height="5" rx="2.5" fill="#0fb5a8"/>' },
  B: { name:"B · Button deck", desc:"A 2×2 deck of control buttons — literally a control deck.",
       art:'<rect x="15" y="15" width="15" height="15" rx="3.5" fill="#fff"/><rect x="34" y="15" width="15" height="15" rx="3.5" fill="#fff" opacity=".82"/><rect x="15" y="34" width="15" height="15" rx="3.5" fill="#fff" opacity=".82"/><rect x="34" y="34" width="15" height="15" rx="3.5" fill="#0fb5a8"/>' },
  C: { name:"C · Stacked deck", desc:"Overlapping cards/layers — a “deck” + overlay layers.",
       art:'<rect x="14" y="22" width="30" height="22" rx="4" fill="#fff" opacity=".55" transform="rotate(-9 29 33)"/><rect x="18" y="20" width="30" height="22" rx="4" fill="#fff" transform="rotate(6 33 31)"/>' },
  D: { name:"D · M monogram", desc:"Bold M — clean, scales tiny, very brandable.",
       art:'<path d="M17 47V19l9 13 9-13v28" fill="none" stroke="#fff" stroke-width="6.5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="44" cy="22" r="4" fill="#0fb5a8"/>' },
  E: { name:"E · Mixer faders", desc:"Control-surface sliders — the “deck” as a mixing board.",
       art:'<g stroke="#fff" stroke-width="3.5" stroke-linecap="round"><path d="M22 16v32M32 16v32M42 16v32"/></g><circle cx="22" cy="38" r="4.5" fill="#0fb5a8"/><circle cx="32" cy="24" r="4.5" fill="#fff"/><circle cx="42" cy="32" r="4.5" fill="#fff"/>' },
  F: { name:"F · Layers + cursor", desc:"Stacked overlay layers with a control cursor.",
       art:'<path d="M32 14 50 23 32 32 14 23z" fill="#fff"/><path d="M14 31l18 9 18-9" fill="none" stroke="#fff" stroke-width="3.5" stroke-linejoin="round" opacity=".6"/><path d="M40 38l3 12 3-5 5 1z" fill="#0fb5a8" stroke="#11131c" stroke-width="1"/>' },
};
function tile(art, size){ return '<svg class="tile '+(size||'')+'" viewBox="0 0 64 64">'+GRAD+'<rect x="4" y="4" width="56" height="56" rx="15" fill="url(#g)"/>'+art+'</svg>'; }
document.getElementById("grid").innerHTML = Object.keys(MARKS).map(function(k){ var m=MARKS[k];
  return '<div class="card"><div class="tiles">'+tile(m.art)+tile(m.art,'sm')+'</div>'+
    '<div class="nm"><span class="opt">'+k+'</span> · '+m.name.replace(/^.· /,'')+'</div>'+
    '<div class="desc">'+m.desc+'</div>'+
    '<div class="wordmark">'+tile(m.art,'sm')+'ModDeck<span class="beta">BETA</span></div></div>';
}).join("");
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ModDeck — Icon Style Choices</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f6f7fb;--panel:#fff;--panel2:#fbfbfd;--line:#e6e8f0;--line2:#d3d7e3;--ink:#1a1d29;--ink-dim:#5b6173;--accent:#5b5bf0;--accent-soft:#ececfe;
    font-family:Inter,system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);padding:28px}
  h1{font-size:24px;font-weight:900;letter-spacing:-.5px}
  .sub{color:var(--ink-dim);font-size:14px;margin:4px 0 22px}
  .cols{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;max-width:1100px}
  .col h2{font-size:13px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;color:var(--ink-dim);margin-bottom:12px;text-align:center}
  .col.pick h2{color:var(--accent)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .wbtn{background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:10px;font-size:11.5px;font-weight:600;color:var(--ink-dim);display:flex;align-items:center;gap:8px}
  .wbtn .i{width:18px;height:18px;display:flex;align-items:center;justify-content:center;font-size:15px;flex:none;color:var(--accent)}
  .wbtn svg{width:18px;height:18px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px}
  .col.pick .panel{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
  .note{font-size:11.5px;color:var(--ink-dim);text-align:center;margin-top:10px}
</style>
</head>
<body>
  <h1>ModDeck — pick an icon style</h1>
  <div class="sub">Same widget palette, three ways. Tell me which (or mix — e.g. line icons but keep brand colors).</div>
  <div class="cols" id="cols"></div>

<script>
// representative widgets (label + emoji + line svg + filled svg)
const P = "currentColor";
const W = [
  { name:"Combined Chat", emoji:"💬",
    line:'<path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7A8.38 8.38 0 0 1 4 11.5 8.5 8.5 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5z" fill="none" stroke="'+P+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>',
    fill:'<path d="M21 11.5a8.38 8.38 0 0 1-8.5 8.5 8.5 8.5 0 0 1-3.8-.9L3 21l1.9-5.7A8.38 8.38 0 0 1 4 11.5 8.5 8.5 0 0 1 12.5 3 8.38 8.38 0 0 1 21 11.5z" fill="'+P+'"/>' },
  { name:"Alert Box", emoji:"🔔",
    line:'<path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9M13.7 21a2 2 0 0 1-3.4 0" fill="none" stroke="'+P+'" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>',
    fill:'<path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9z" fill="'+P+'"/><path d="M13.7 21a2 2 0 0 1-3.4 0" stroke="'+P+'" stroke-width="2" stroke-linecap="round"/>' },
  { name:"Timer", emoji:"⏱️",
    line:'<circle cx="12" cy="13" r="8" fill="none" stroke="'+P+'" stroke-width="2"/><path d="M12 9v4l2 2M9 2h6" stroke="'+P+'" stroke-width="2" stroke-linecap="round"/>',
    fill:'<circle cx="12" cy="13" r="8" fill="'+P+'"/><path d="M12 9v4l2 2" stroke="#fff" stroke-width="2" stroke-linecap="round"/><path d="M9 2h6" stroke="'+P+'" stroke-width="2" stroke-linecap="round"/>' },
  { name:"Goal Bar", emoji:"🎯",
    line:'<circle cx="12" cy="12" r="9" fill="none" stroke="'+P+'" stroke-width="2"/><circle cx="12" cy="12" r="5" fill="none" stroke="'+P+'" stroke-width="2"/><circle cx="12" cy="12" r="1.5" fill="'+P+'"/>',
    fill:'<circle cx="12" cy="12" r="9" fill="'+P+'" opacity=".25"/><circle cx="12" cy="12" r="5" fill="'+P+'" opacity=".55"/><circle cx="12" cy="12" r="2" fill="'+P+'"/>' },
  { name:"Live Poll", emoji:"📊",
    line:'<path d="M5 21V10M12 21V4M19 21v-7" stroke="'+P+'" stroke-width="2" stroke-linecap="round"/>',
    fill:'<rect x="3.5" y="10" width="3.5" height="11" rx="1" fill="'+P+'"/><rect x="10.2" y="4" width="3.5" height="17" rx="1" fill="'+P+'"/><rect x="17" y="14" width="3.5" height="7" rx="1" fill="'+P+'"/>' },
  { name:"Prize Wheel", emoji:"🎡",
    line:'<circle cx="12" cy="12" r="9" fill="none" stroke="'+P+'" stroke-width="2"/><path d="M12 3v18M3 12h18M5.6 5.6l12.8 12.8M18.4 5.6 5.6 18.4" stroke="'+P+'" stroke-width="1.5"/>',
    fill:'<circle cx="12" cy="12" r="9" fill="'+P+'"/><path d="M12 3v18M3 12h18M5.6 5.6l12.8 12.8M18.4 5.6 5.6 18.4" stroke="#fff" stroke-width="1.3" opacity=".8"/><circle cx="12" cy="12" r="2" fill="#fff"/>' },
  { name:"Viewer Count", emoji:"👁",
    line:'<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" fill="none" stroke="'+P+'" stroke-width="2" stroke-linejoin="round"/><circle cx="12" cy="12" r="3" fill="none" stroke="'+P+'" stroke-width="2"/>',
    fill:'<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z" fill="'+P+'"/><circle cx="12" cy="12" r="3" fill="#fff"/>' },
  { name:"Emoji Combo", emoji:"🔥",
    line:'<path d="M12 2s5 4 5 9a5 5 0 0 1-10 0c0-2 1-3 1-3s0 2 2 2c0-3 2-5 2-8z" fill="none" stroke="'+P+'" stroke-width="2" stroke-linejoin="round"/>',
    fill:'<path d="M12 2s5 4 5 9a5 5 0 0 1-10 0c0-2 1-3 1-3s0 2 2 2c0-3 2-5 2-8z" fill="'+P+'"/>' },
  { name:"QR Code", emoji:"🔳",
    line:'<rect x="3" y="3" width="7" height="7" rx="1" fill="none" stroke="'+P+'" stroke-width="2"/><rect x="14" y="3" width="7" height="7" rx="1" fill="none" stroke="'+P+'" stroke-width="2"/><rect x="3" y="14" width="7" height="7" rx="1" fill="none" stroke="'+P+'" stroke-width="2"/><path d="M14 14h3v3M21 14v7h-7v-3" stroke="'+P+'" stroke-width="2" stroke-linecap="round"/>',
    fill:'<rect x="3" y="3" width="7" height="7" rx="1" fill="'+P+'"/><rect x="14" y="3" width="7" height="7" rx="1" fill="'+P+'"/><rect x="3" y="14" width="7" height="7" rx="1" fill="'+P+'"/><rect x="14" y="14" width="3" height="3" fill="'+P+'"/><rect x="18" y="18" width="3" height="3" fill="'+P+'"/>' },
  { name:"Discord Highlights", emoji:"⭐",
    line:'<path d="M12 3l2.6 5.3 5.9.9-4.3 4.2 1 5.9L12 16.8 6.8 19.5l1-5.9L3.5 9.4l5.9-.9z" fill="none" stroke="'+P+'" stroke-width="2" stroke-linejoin="round"/>',
    fill:'<path d="M12 3l2.6 5.3 5.9.9-4.3 4.2 1 5.9L12 16.8 6.8 19.5l1-5.9L3.5 9.4l5.9-.9z" fill="'+P+'"/>' },
];

function btn(label, inner){ return `<div class="wbtn"><span class="i">${inner}</span>${label}</div>`; }
function svg(p){ return `<svg viewBox="0 0 24 24" fill="none">${p}</svg>`; }

const cols = document.getElementById("cols");
const styles = [
  { key:"emoji", title:"A · Emoji (current)", render:w=>btn(w.name, w.emoji) },
  { key:"line",  title:"B · Line icons",      render:w=>btn(w.name, svg(w.line)), pick:true },
  { key:"fill",  title:"C · Filled icons",    render:w=>btn(w.name, svg(w.fill)) },
];
cols.innerHTML = styles.map(s=>`
  <div class="col ${s.pick?'pick':''}">
    <h2>${s.title}${s.pick?' ◀ my pick':''}</h2>
    <div class="panel"><div class="grid">${W.map(s.render).join("")}</div></div>
    <div class="note">${s.key==='emoji'?'Renders differently per OS/browser':s.key==='line'?'Crisp, on-brand, tints with accent':'Bold, high-contrast'}</div>
  </div>`).join("");
</script>
</body>
</html>

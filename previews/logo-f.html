<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ModDeck — Logo F platform colors</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
  :root{--bg:#f6f7fb;--ink:#12141d;--dim:#5b6173;font-family:Inter,system-ui,sans-serif}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--ink);padding:30px}
  h1{font-size:24px;font-weight:900;letter-spacing:-.5px}
  .sub{color:var(--dim);font-size:14px;margin:4px 0 8px}
  h2{font-size:13px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--dim);margin:26px 0 12px}
  .row{display:flex;gap:22px;flex-wrap:wrap}
  .item{text-align:center}
  .tile{width:96px;height:96px}
  .cap{font-size:12px;font-weight:700;margin-top:8px}
  .cap small{display:block;color:var(--dim);font-weight:500;font-size:11px}
  .wm{display:flex;align-items:center;gap:10px;margin-top:26px;font-weight:800;font-size:20px;line-height:1}
  .wm .beta{font-size:9px;font-weight:800;letter-spacing:1px;background:#5cc8ff;color:#053048;padding:2px 7px;border-radius:6px}
  .wm svg{width:36px;height:36px}
</style>
</head>
<body>
  <h1>Logo F — platform colors</h1>
  <div class="sub">The mark tints to whichever platform you log in with. Two options for how far the color goes.</div>

  <h2>Option 1 — Accent tint (indigo tile, cursor changes color)</h2>
  <div class="row" id="r1"></div>

  <h2>Option 2 — Full platform theme (whole tile changes color)</h2>
  <div class="row" id="r2"></div>

  <h2>In the wordmark (Option 1, by platform)</h2>
  <div id="wm"></div>

<script>
// F mark: layers + cursor. cursor color = accent.
function fMark(cursor, cursorOutline){
  return '<path d="M32 13 51 23 32 33 13 23z" fill="#fff"/>'+
         '<path d="M13 29.5 32 39.5 51 29.5" fill="none" stroke="#fff" stroke-width="3" opacity=".5" stroke-linejoin="round"/>'+
         '<path d="M39 35l2.3 11 2.6-4.4 4.6.7z" fill="'+cursor+'" stroke="'+(cursorOutline||'#11131c')+'" stroke-width="1.2" stroke-linejoin="round"/>';
}
function tile(grad, mark){return '<svg class="tile" viewBox="0 0 64 64"><defs><linearGradient id="'+grad.id+'" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="'+grad.a+'"/><stop offset="1" stop-color="'+grad.b+'"/></linearGradient></defs><rect x="4" y="4" width="56" height="56" rx="15" fill="url(#'+grad.id+')"/>'+mark+'</svg>';}
var INDIGO={id:'ig',a:'#6d6dff',b:'#5b5bf0'};
var PLAT=[
  {n:'Default / logged out',cur:'#0fb5a8',grad:INDIGO,tileGrad:INDIGO},
  {n:'Kick',sub:'#53fc18',cur:'#53fc18',grad:INDIGO,tileGrad:{id:'gk',a:'#5dff2b',b:'#33cc0d'}},
  {n:'Twitch',sub:'#9146FF',cur:'#a970ff',grad:INDIGO,tileGrad:{id:'gt',a:'#b388ff',b:'#9146FF'}},
  {n:'YouTube',sub:'#FF0000',cur:'#ff5b5b',grad:INDIGO,tileGrad:{id:'gy',a:'#ff6b6b',b:'#ff0000'}},
];
document.getElementById('r1').innerHTML = PLAT.map(function(p){
  return '<div class="item">'+tile(p.grad, fMark(p.cur))+'<div class="cap">'+p.n+'<small>'+(p.sub||'#0fb5a8')+'</small></div></div>';
}).join('');
document.getElementById('r2').innerHTML = PLAT.slice(1).map(function(p){
  return '<div class="item">'+tile(p.tileGrad, fMark('#ffffff','rgba(0,0,0,.35)'))+'<div class="cap">'+p.n+'</div></div>';
}).join('');
document.getElementById('wm').innerHTML = PLAT.map(function(p){
  return '<div class="wm">'+tile(p.grad,fMark(p.cur))+'ModDeck<span class="beta">BETA</span> <span style="font-size:12px;color:#5b6173;font-weight:600">'+p.n+'</span></div>';
}).join('');
</script>
</body>
</html>

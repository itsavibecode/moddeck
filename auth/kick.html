<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signing in… — ModDeck</title>
<meta name="robots" content="noindex">
<link rel="icon" href="../favicon.svg" type="image/svg+xml">
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:Inter,-apple-system,system-ui,sans-serif;color:#12141d;
    background:#f6f7fb radial-gradient(620px 340px at 50% 0%,rgba(91,91,240,.16),transparent 65%)}
  .box{text-align:center;max-width:420px;padding:28px}
  img{width:48px;height:48px;margin-bottom:14px}
  .spin{width:34px;height:34px;border:3px solid #d3d7e3;border-top-color:#5b5bf0;border-radius:50%;margin:8px auto 16px;animation:s 1s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
  h1{font-size:18px;margin:0 0 6px} p{color:#5b6173;font-size:14px;margin:0}
  a{display:inline-block;margin-top:16px;background:#5b5bf0;color:#fff;text-decoration:none;font-weight:700;padding:10px 18px;border-radius:10px}
  .err{color:#c0392b}
</style>
</head>
<body>
  <div class="box">
    <img src="../favicon.svg" alt="ModDeck">
    <div class="spin" id="spin"></div>
    <h1 id="title">Signing you in…</h1>
    <p id="msg">Finishing your Kick login.</p>
    <div id="actions"></div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
  <script src="../js/firebase-config.js"></script>
  <script src="../js/config.js"></script>
  <script src="../js/auth.js"></script>
  <script>
    (async function () {
      const title = document.getElementById("title"), msg = document.getElementById("msg"),
            spin = document.getElementById("spin"), actions = document.getElementById("actions");
      try {
        const profile = await MD.auth.completeKick();
        spin.style.display = "none";
        title.textContent = "Welcome, " + (profile.username || "streamer") + "!";
        msg.textContent = "You're signed in. Taking you to your dashboard…";
        setTimeout(() => { location.href = "../dashboard.html"; }, 900);
      } catch (e) {
        spin.style.display = "none";
        title.textContent = "Login didn't complete";
        title.className = "err";
        msg.textContent = (e && e.message) || "Something went wrong.";
        actions.innerHTML = '<a href="../dashboard.html">Continue to dashboard</a>';
      }
    })();
  </script>
</body>
</html>

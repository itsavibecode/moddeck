<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ModDeck Overlay</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/overlay.css?v=0.34.0">
</head>
<body>
<div id="fit"><div id="stage"></div><div id="recDot"><span class="d"></span><span class="t">CLIP</span></div><div id="wm"><span id="wmLogo"></span>ModDeck</div></div>
<div id="hint">Waiting for <b>ModDeck</b>…<small>Open your dashboard and hit <b>Push to Live</b></small></div>

<script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-database-compat.js"></script>
<script src="js/firebase-config.js?v=0.34.0"></script>
<script src="js/icons.js?v=0.34.0"></script>
<script src="js/widgets.js?v=0.34.0"></script>
<script src="js/sync.js?v=0.34.0"></script>
<script src="js/chat-kick.js?v=0.34.0"></script>
<script src="js/chat-twitch.js?v=0.34.0"></script>
<script>
(function () {
  window.MD.isOverlay = true;   // tells shared widgets this is the live player (Media Share actually plays here)
  const params = new URLSearchParams(location.search);
  const channelId = params.get("c") || "dev-local";
  const isPreview = params.get("preview") === "1";   // show the waiting hint only in-browser preview
  const stage = document.getElementById("stage"), fit = document.getElementById("fit"), hint = document.getElementById("hint");
  if (!isPreview) hint.style.display = "none";
  if (params.get("nowm")) { const wm = document.getElementById("wm"); if (wm) wm.style.display = "none"; }
  // watermark logo tinted to the channel's platform (kick:123 -> kick)
  var _plat = channelId.indexOf(":") > 0 ? channelId.split(":")[0] : null;
  var _wl = document.getElementById("wmLogo"); if (_wl && window.MD.logoSvg) _wl.innerHTML = MD.logoSvg(_plat);

  // auto-clip recording indicator — flash the red CLIP dot for ~4s when a clip fires
  var _recTimer;
  MD.sync.onClip(function () {
    var r = document.getElementById("recDot"); if (!r) return;
    r.style.display = "flex"; clearTimeout(_recTimer);
    _recTimer = setTimeout(function () { r.style.display = "none"; }, 4000);
  });

  // scale 1920x1080 to fit the window (OBS source is 1920x1080 => scale 1)
  function resize() {
    const s = Math.min(innerWidth / 1920, innerHeight / 1080);
    fit.style.transform = `scale(${s})`;
  }
  addEventListener("resize", resize); resize();

  // real channels (a platform uid like "kick:123") read from Firebase; "dev-local" uses the local demo bus
  if (channelId !== "dev-local" && typeof firebase !== "undefined" && window.MD.firebaseConfig) {
    try { firebase.initializeApp(window.MD.firebaseConfig); } catch (e) {}
    MD.sync.init({ backend: "firebase", db: firebase.database(), channelId });
    // connect this channel's real Kick chat (chatroom id was recorded by the dashboard on login)
    MD.sync.loadMeta(function (meta) {
      if (!meta) return;
      if (meta.chatroomId && window.MD.chat) MD.chat.connectKick(meta.chatroomId);
      if (meta.twitchChannel && window.MD.chatTwitch) MD.chatTwitch.connect(meta.twitchChannel);   // Twitch chat (optional)
    });
  } else {
    MD.sync.init({ channelId });
  }
  MD.widgets.enableScheduler();             // loop visibility of auto-scheduled elements

  // remote soundboard: play one-shot cues; track for stop-all
  const playing = [];
  MD.sync.onSound(function (p) {
    if (!p) return;
    if (p.stop) { playing.forEach(a => { try { a.pause(); a.currentTime = 0; } catch {} }); playing.length = 0; return; }
    if (p.url) { const a = new Audio(p.url); a.volume = p.volume == null ? 1 : p.volume; playing.push(a); a.play().catch(() => {}); a.onended = () => { const i = playing.indexOf(a); if (i >= 0) playing.splice(i, 1); }; }
  });

  const layer = MD.widgets.Layer(stage);   // no wrapper => plain positioned widgets
  let currentBoard = null;
  MD.sync.onLive(function (board) {
    if (!board || !board.order) return;
    currentBoard = board;
    layer.render(board);
    if (isPreview) hint.style.display = board.order.length ? "none" : "block";
  });

  // real alerts (Kick follows / subs / gifts / Kicks) — fired by the worker webhook into alertCue.
  // ignore stale cues so refreshing OBS doesn't replay the last alert.
  MD.sync.onAlert(function (cue) {
    if (!cue || !MD.widgets.playAlert) return;
    if (cue.t && (Date.now() - cue.t) > 12000) return;
    MD.widgets.playAlert(stage, currentBoard, cue);
  });

  // test emote bursts (from the dashboard "Test combo" button) feed the live Emoji Combo
  MD.sync.onEmote(function (cue) {
    if (!cue || !cue.burst || !MD.replayEmoteBurst) return;
    if (cue.t && (Date.now() - cue.t) > 12000) return;   // ignore stale on refresh
    MD.replayEmoteBurst(cue.burst);
  });
  // test chat messages (from the dashboard "Test chat" button) feed the live Kick Chat widget
  MD.sync.onChatTest(function (cue) {
    if (!cue || !cue.msgs || !MD.replayChatTest) return;
    if (cue.t && (Date.now() - cue.t) > 15000) return;
    MD.replayChatTest(cue.msgs);
  });
})();
</script>
</body>
</html>
